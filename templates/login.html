<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Tracker - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            height:100vh;
        }

        .login-card{
            width:400px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .logo{
            font-size:2rem;
            font-weight:bold;
            color:#0d6efd;
        }

        .subtitle{
            color:gray;
        }
    </style>
</head>

<body>

<div class="container h-100">
    <div class="row h-100 justify-content-center align-items-center">

        <div class="card login-card p-4">

            <div class="text-center mb-4">
                <div class="logo">
                    Log Tracker
                </div>

                <div class="subtitle">
                    ShaktiDB Audit System
                </div>
            </div>

            <!-- Flash Messages -->

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-{{category}}">
                            {{message}}
                        </div>

                    {% endfor %}

                {% endif %}
            {% endwith %}


            <form action="{{ url_for('login') }}" method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="username"
                        maxlength="10"
                        required>

                </div>


                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        required>

                </div>


                <div class="d-grid">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Login

                    </button>

                </div>

            </form>

            <hr>

            <div class="text-center text-muted">

                <small>

                    File Activity Monitoring System

                </small>

            </div>

        </div>

    </div>
</div>

</body>
</html>
